# git-cliff configuration for codex-terminal-themes.
# yaml-language-server: $schema=https://www.schemastore.org/any.json

"$schema"   = "https://gist.githubusercontent.com/Nick2bad4u/5a39907931f3dc6d11ed1149ad4ac549/raw/9ee6a46909c466d15568cde15aa0c132d377655d/generic.schema.json"
description = "Configuration file for git-cliff to generate changelogs based on conventional commits."
name        = "Repository Changelog Configuration"
version     = "1.0.1"

[changelog]
    header = """
# Changelog\n
All notable changes to this project will be documented in this file.\n
"""
    body = """
{% if version %}\
  ## [{{ version | trim_start_matches(pat="v") }}] - {{ timestamp | date(format="%Y-%m-%d") }}
{% else %}\
  ## [Unreleased]
{% endif %}
{% for group, commits in commits | group_by(attribute="group") %}
  ### {{ group | striptags | trim | upper_first }}
  {% for commit in commits %}
    - [`{{ commit.id | truncate(length=7, end="") }}`] - {% if commit.scope %}*({{ commit.scope }})* {% endif %}{{ commit.message | upper_first }}
  {% endfor %}
{% endfor %}\n
"""
    footer = """
## License
This project is licensed under the Unlicense.
"""
    render_always = true
    trim = true

[git]
    conventional_commits = true
    filter_unconventional = false
    split_commits = false
    commit_parsers = [
        { message = "^.*\\[feat\\]", group = "Features" },
        { message = "^.*\\[fix\\]", group = "Bug Fixes" },
        { message = "^.*\\[docs\\]", group = "Documentation" },
        { message = "^.*\\[ci\\]", group = "CI/CD" },
        { message = "^.*\\[chore\\]", group = "Chores" },
        { message = ".*", group = "Other Changes" }
    ]
    sort_commits = "newest"

[remote]
    offline = true

    [remote.github]
        owner = "Nick2bad4u"
        repo  = "codex-terminal-themes"
