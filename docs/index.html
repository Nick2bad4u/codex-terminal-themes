<!doctype html>
<html lang="en">
    <head>
        <meta charset="utf-8" />
        <meta
            content="width=device-width, initial-scale=1"
            name="viewport"
        />
        <title>Codex Terminal Themes</title>
        <link
            href="styles.css"
            rel="stylesheet"
        />
        <link
            type="image/svg+xml"
            href="favicon.svg"
            rel="icon"
        />
        <meta
            content="#0b0d10"
            name="msapplication-TileColor"
        />
        <meta
            content="Codex Terminal Themes"
            property="og:title"
        />
        <meta
            content="website"
            property="og:type"
        />
        <meta
            content="https://nick2bad4u.github.io/codex-terminal-themes/"
            property="og:url"
        />
        <meta
            content="https://nick2bad4u.github.io/codex-terminal-themes/preview.svg"
            property="og:image"
        />
        <meta
            content="Interactive gallery for Codex terminal TextMate themes."
            name="description"
        />
    </head>
    <body>
        <header class="site-header">
            <div class="site-title">
                <p class="eyebrow">TextMate theme gallery</p>
                <h1>Codex Terminal Themes</h1>
            </div>
            <div
                class="header-artwork"
                aria-hidden="true"
            >
                <img
                    alt=""
                    height="819"
                    src="assets/theme-gallery-header.png"
                    width="1920"
                />
            </div>
            <div
                class="site-stats"
                aria-label="Theme statistics"
            >
                <span id="theme_count">0 themes</span>
                <span id="scope_count">0 scopes</span>
            </div>
        </header>

        <main class="app-shell">
            <aside
                class="sidebar"
                aria-label="Theme controls"
            >
                <div class="control-group">
                    <label for="theme_search">Search</label>
                    <input
                        id="theme_search"
                        type="search"
                        autocomplete="off"
                        placeholder="Theme, author, scope"
                    />
                </div>

                <div class="control-group">
                    <label for="appearance_filter">Appearance</label>
                    <select id="appearance_filter">
                        <option value="all">All appearances</option>
                        <option value="dark">Dark</option>
                        <option value="light">Light</option>
                        <option value="unknown">Unknown</option>
                    </select>
                </div>

                <div class="control-group">
                    <label for="hue_filter">Hue</label>
                    <select id="hue_filter">
                        <option value="all">All hues</option>
                        <option value="red">Red</option>
                        <option value="orange">Orange</option>
                        <option value="yellow">Yellow</option>
                        <option value="green">Green</option>
                        <option value="cyan">Cyan</option>
                        <option value="blue">Blue</option>
                        <option value="purple">Purple</option>
                        <option value="pink">Pink</option>
                        <option value="neutral">Neutral</option>
                    </select>
                </div>

                <div class="control-group">
                    <label for="color_picker">Color</label>
                    <div class="color-tool">
                        <div class="color-entry">
                            <input
                                id="color_picker"
                                type="text"
                                autocomplete="off"
                                inputmode="text"
                                pattern="#?[0-9a-fA-F]{3,8}"
                                placeholder="#69d6c6"
                                value="#69d6c6"
                            />
                            <button
                                id="color_wheel_button"
                                type="button"
                                class="color-wheel-button"
                                aria-controls="color_wheel_popover"
                                aria-expanded="false"
                                aria-label="Open color wheel"
                            >
                                <span
                                    id="color_preview"
                                    aria-hidden="true"
                                ></span>
                            </button>
                        </div>
                        <div
                            id="color_wheel_popover"
                            class="color-popover"
                            hidden
                        >
                            <output
                                id="color_rgb"
                                class="color-rgb"
                                for="color_picker color_lightness"
                            >
                                rgb(105, 214, 198)
                            </output>
                            <button
                                id="color_wheel"
                                type="button"
                                class="color-wheel"
                                aria-label="Color wheel"
                            >
                                <span
                                    id="color_wheel_marker"
                                    class="color-wheel-marker"
                                    aria-hidden="true"
                                ></span>
                            </button>
                            <label
                                class="lightness-control"
                                for="color_lightness"
                            >
                                <span>Lightness</span>
                                <input
                                    id="color_lightness"
                                    type="range"
                                    max="85"
                                    min="15"
                                    value="64"
                                />
                            </label>
                        </div>
                        <label class="color-toggle">
                            <input
                                id="color_enabled"
                                type="checkbox"
                            />
                            Match color
                        </label>
                    </div>
                </div>

                <div
                    id="theme_list"
                    class="theme-list"
                ></div>
            </aside>

            <section
                class="preview-panel"
                aria-live="polite"
            >
                <div class="preview-toolbar">
                    <div>
                        <p
                            id="selected_appearance"
                            class="eyebrow"
                            >Theme</p
                        >
                        <h2 id="selected_name">Loading themes</h2>
                    </div>
                    <a
                        id="theme_download"
                        download
                        href="../themes/"
                        >Download</a
                    >
                </div>

                <div
                    id="metadata_strip"
                    class="metadata-strip"
                ></div>

                <div
                    id="terminal_frame"
                    class="terminal-frame"
                >
                    <div class="terminal-chrome">
                        <span></span>
                        <span></span>
                        <span></span>
                    </div>
                    <div
                        id="code_grid"
                        class="code-grid"
                    ></div>
                </div>
            </section>
        </main>

        <script
            type="module"
            src="app.js"
        ></script>
    </body>
</html>
