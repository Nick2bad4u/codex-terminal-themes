    <text x="96" y="404" fill="#6eb4ff" font-family="Cascadia Code, Consolas, monospace" font-size="26">preview</text>
    <text x="218" y="404" fill="#e8edf3" font-family="Cascadia Code, Consolas, monospace" font-size="26">.render(</text>
