# yaml-language-server: $schema=https://www.schemastore.org/github-workflow.json
name: "Trufflehog Secret Scan"

run-name: "Trufflehog Secret Scan • ${{ github.ref_name }} @${{ github.actor }}"

concurrency:
    group: "trufflehog-${{ github.workflow }}-${{ github.ref }}"
    cancel-in-progress: true

on:
    push:
    pull_request:
    merge_group:
        types:
            - "checks_requested"
    workflow_dispatch:
    schedule:
        - cron: "44 4 * * 0"

permissions: {}

jobs:
    trufflehog:
        name: "Trufflehog Secret Scan"
        runs-on: "ubuntu-latest"
        timeout-minutes: 20
        permissions:
            contents: "read"
        steps:
            - name: "Checkout code"
              uses: "actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10" # v6.0.3
              with:
                  fetch-depth: 0

            - name: "Secret Scanning"
              uses: "trufflesecurity/trufflehog@d411fff7b8879a62509f3fa98c07f247ac089a51" # v3.95.5
              with:
                  base: ""
                  head: "${{ github.ref_name }}"
                  extra_args: "--results=verified --exclude-detectors=URI"
